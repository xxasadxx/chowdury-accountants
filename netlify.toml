[build]
  publish = "."

[functions]
  node_bundler = "esbuild"

[context.production]
  environment = { NODE_VERSION = "18" }

# GoCardless live data sync — 5:00am and 3:00pm daily
[functions."gc-sync-scheduled"]
  schedule = "0 5,15 * * *"

# Companies House deadlines sync — 5:15am daily (moved from midnight)
[functions."ch-sync-scheduled"]
  schedule = "15 5 * * *"

# InformDirect director & CS date sync — 5:30am daily
[functions."id-sync-scheduled"]
  schedule = "30 5 * * *"
