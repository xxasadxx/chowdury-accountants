<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Chowdury Accountants</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a18;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Mulish',sans-serif;padding:20px}
.card{background:#FBFAE8;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.band{height:4px;background:#c8963c;border-radius:14px 14px 0 0;margin:-40px -36px 32px}
.logo{display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.logo img{height:48px;width:auto}
h1{font-family:'Raleway',sans-serif;font-size:22px;font-weight:800;color:#252525;text-align:center;margin-bottom:4px}
.subtitle{font-size:12px;color:#7A7A7A;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#4A4A4A;margin-bottom:6px}
.input-wrap{position:relative}
input{width:100%;padding:11px 14px;border:1.5px solid #DEDEDE;border-radius:8px;font-size:14px;font-family:'Mulish',sans-serif;color:#252525;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:#c8963c;box-shadow:0 0 0 3px rgba(200,150,60,.12)}
input[type="password"]{padding-right:44px;letter-spacing:.1em}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#7A7A7A;font-size:16px;user-select:none}
.error{background:#FCEEE8;border:1px solid rgba(185,28,28,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#D04A02;display:none;margin-bottom:16px}
.error.show{display:block}
button{width:100%;padding:13px;background:#252525;color:#fff;border:none;border-radius:8px;font-size:15px;font-family:'Mulish',sans-serif;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;position:relative}
button:hover{background:#c8963c}
button:disabled{opacity:.6;cursor:not-allowed}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;position:absolute;right:16px;top:50%;transform:translateY(-50%)}
button.loading .spinner{display:block}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.footer-note{font-size:11px;color:#7A7A7A;text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="band"></div>
  <div class="logo"><img src="ca-logo.png" alt="Chowdury Accountants"></div>
  <h1>Practice Portal</h1>
  <p class="subtitle">Sign in with your email and password</p>
  <div class="error" id="error"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
  </div>
  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <span class="toggle-pw" onclick="togglePw()">👁</span>
    </div>
  </div>
  <button id="btn" onclick="login()">Sign In → <span class="spinner"></span></button>
  <p class="footer-note">Chowdury Accountants Ltd · Internal use only</p>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://yhvhpfsoqtjwnukgyqap.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4'
);

// Role map — used as fallback if user_profiles table not ready
const ROLE_MAP = {
  'asad@chowduryaccountants.co.uk':    {role:'admin', name:'Asadul', full_name:'Md Asadul Chowdury'},
  'hassan@chowduryaccountants.co.uk':  {role:'staff', name:'Hassan', full_name:'Hassan Ali'},
  'amin@chowduryaccountants.co.uk':    {role:'staff', name:'Aminul', full_name:'Aminul Choudhury'},
  'info@chowduryaccountants.co.uk':    {role:'staff', name:'Nawaz',  full_name:'Syed Nawaz'},
  'sadat@chowduryaccountants.co.uk':   {role:'staff', name:'Sadat',  full_name:'Sadat Hossain'},
};

window.onload = async () => {
  document.getElementById('email').focus();
  // Check if already logged in
  const { data: { session } } = await sb.auth.getSession();
  if(session) window.location.href = 'index.html';
};

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = '⚠️ ' + msg;
  err.classList.add('show');
  setTimeout(() => err.classList.remove('show'), 5000);
}

async function login() {
  const btn = document.getElementById('btn');
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('pw').value;
  if(!email || !pw) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.classList.add('loading');

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  if(error) {
    btn.disabled = false;
    btn.classList.remove('loading');
    if(error.message.includes('Invalid login')) {
      showError('Incorrect email or password.');
    } else if(error.message.includes('too many')) {
      showError('Too many attempts. Please wait a few minutes.');
    } else {
      showError(error.message);
    }
    document.getElementById('pw').value = '';
    return;
  }

  // Store role/name — from user_metadata or fallback map
  const meta = data.user.user_metadata || {};
  const fallback = ROLE_MAP[email] || {};
  const role = meta.role || fallback.role || 'staff';
  const name = meta.name || fallback.name || email.split('@')[0];
  const fullName = meta.full_name || fallback.full_name || name;

  localStorage.setItem('ca_role', role);
  localStorage.setItem('ca_name', name);
  localStorage.setItem('ca_full_name', fullName);
  localStorage.setItem('ca_email', email);
  localStorage.removeItem('ca_login_attempts');
  localStorage.removeItem('ca_locked');

  window.location.href = 'index.html';
}

function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
