    }catch(e){fail++;addLog('✗ '+c.comp_no+' — '+e.message,'err');}
  }
  addLog('');
  addLog('Done: '+ok+' updated, '+fail+' failed',ok>0?'ok':'err');
  if(!fail)addLog('All done — you can close this page.','ok');
}
</script>
