<!DOCTYPE html>
<html>
<head>
<script>if(sessionStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<style>body{font-family:sans-serif;padding:30px;max-width:600px;margin:0 auto}
button{padding:10px 20px;background:#155FA0;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-top:16px}
#log{margin-top:20px;font-size:12px;font-family:monospace;background:#f5f5f5;padding:16px;border-radius:6px;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.ok{color:green}.err{color:red}</style>
</head>
<body>
<h2>Director Name Bulk Sync</h2>
<p>Syncs <strong>director_name</strong> for <strong>303 clients</strong> from seed data into Supabase so greetings work correctly in Communications.</p>
<button onclick="runUpdate()">▶ Run Sync</button>
<div id="log">Ready — click Run Sync to start.</div>
<script src="director_name_update.js"></script>
<script>
const SB='https://yhvhpfsoqtjwnukgyqap.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const log = document.getElementById('log');

function addLog(msg,cls=''){const d=document.createElement('div');d.className=cls;d.textContent=msg;log.appendChild(d);log.scrollTop=log.scrollHeight;}

async function runUpdate(){
  log.innerHTML='';
  addLog(`Syncing ${DIRECTOR_NAME_DATA.length} director names...`);
  let ok=0,fail=0;
  for(const c of DIRECTOR_NAME_DATA){
    try{
      const r=await fetch(SB+'/rest/v1/ltd_clients?comp_no=eq.'+encodeURIComponent(c.comp_no),{
        method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
        body:JSON.stringify({director_name:c.director_name})
      });
      if(r.ok||r.status===204){ok++;addLog(`✓ ${c.comp_no} — ${c.director_name}`,'ok');}
      else{fail++;addLog(`✗ ${c.comp_no} — HTTP ${r.status}`,'err');}
    }catch(e){fail++;addLog(`✗ ${c.comp_no} — ${e.message}`,'err');}
  }
  addLog('');
  addLog(`Done: ${ok} updated, ${fail} failed`,ok>0?'ok':'err');
  if(!fail) addLog('✅ All done — you can close this page.','ok');
}
</script>
</body>
</html>
