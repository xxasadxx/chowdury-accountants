<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Portal — Chowdury Accountants</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8963c;--dark:#1a1a18;--bg:#f0f2f5;--white:#fff;--ink:#252525;--muted:#888;--border:#e8e8e8}
body{font-family:'Mulish','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:13px}

/* HEADER */
#hdr{background:var(--dark);position:sticky;top:0;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#hdr .band{height:4px;background:var(--gold)}
#hdr .top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
#hdr .logo img{height:34px;display:block}
#hdr .top-right{display:flex;align-items:center;gap:16px}
#hdr .user-name{font-size:0.78rem;color:rgba(255,255,255,.5);font-weight:600}
#hdr .signout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:5px 12px;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
#hdr .signout-btn:hover{color:#ff6b6b;border-color:#ff6b6b}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 88px)}

/* SIDEBAR */
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);flex-shrink:0;padding:20px 0}
.sidebar .company-card{padding:14px 18px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar .company-card .co-label{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px}
.sidebar .company-card .co-name{font-size:0.88rem;font-weight:800;color:var(--dark);line-height:1.3}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 18px;font-size:0.85rem;font-weight:600;color:#555;text-decoration:none;transition:all .15s;border-left:3px solid transparent}
.sidebar nav a:hover{background:#fafafa;color:var(--dark)}
.sidebar nav a.active{background:#fff8ee;color:var(--gold);border-left-color:var(--gold)}
.sidebar nav a .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.sidebar nav .nav-sep{height:1px;background:var(--border);margin:8px 16px}

/* MAIN CONTENT */
.content{flex:1;padding:24px;overflow-x:hidden}
.page-title{font-size:1.1rem;font-weight:800;color:var(--dark);margin-bottom:4px}
.page-sub{font-size:0.82rem;color:var(--muted);margin-bottom:20px}

/* WELCOME CARD */
.welcome-card{background:var(--dark);border-radius:12px;padding:22px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.welcome-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:120px;height:120px;border-radius:50%;background:rgba(200,150,60,.08)}
.welcome-card .wc-greeting{font-size:0.78rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.welcome-card h2{font-size:1.2rem;font-weight:800;color:var(--white);margin-bottom:3px}
.welcome-card .wc-company{color:var(--gold);font-size:0.88rem;font-weight:600}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:10px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-card .stat-val{font-size:1.6rem;font-weight:800;color:var(--dark);line-height:1}
.stat-card .stat-lbl{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.stat-card.gold .stat-val{color:var(--gold)}
.stat-card.green .stat-val{color:#2e7d32}

/* QUICK ACTIONS */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.qa-card{background:var(--white);border-radius:10px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.qa-card:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(200,150,60,.15)}
.qa-card .qa-icon{font-size:1.4rem;margin-bottom:8px}
.qa-card .qa-title{font-size:0.85rem;font-weight:700;color:var(--dark);margin-bottom:2px}
.qa-card .qa-sub{font-size:0.75rem;color:var(--muted)}

/* RECENT DOCS */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h3{font-size:0.85rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)}
.section-head a{font-size:0.78rem;color:var(--gold);text-decoration:none;font-weight:600}
.doc-row{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:all .15s}
.doc-row:hover{border-color:var(--gold)}
.doc-row .dr-left{display:flex;align-items:center;gap:10px}
.doc-row .dr-badge{background:var(--dark);color:var(--gold);padding:3px 8px;border-radius:4px;font-size:0.68rem;font-weight:800;text-transform:uppercase;white-space:nowrap}
.doc-row .dr-name{font-size:0.83rem;font-weight:600;color:var(--dark)}
.doc-row .dr-date{font-size:0.75rem;color:var(--muted)}
.doc-row .dr-right{display:flex;align-items:center;gap:8px}
.status-pill{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;text-transform:uppercase}
.status-pill.approved{background:#e8f5e9;color:#2e7d32}
.status-pill.pending{background:#fff8e1;color:#f59e0b}
.btn-small{border:none;border-radius:6px;padding:5px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-small.gold{background:var(--gold);color:var(--white)}
.btn-small.dark{background:var(--dark);color:var(--white)}
.empty-state{text-align:center;padding:32px;color:var(--muted);font-size:0.85rem}

/* MOBILE */
@media(max-width:680px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:12px 0}
  .sidebar nav{display:flex;overflow-x:auto;padding:0 8px}
  .sidebar nav a{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;padding:8px 12px;border-radius:0}
  .sidebar nav a.active{border-bottom-color:var(--gold);border-left-color:transparent}
  .sidebar .company-card{display:none}
  .sidebar nav .nav-sep{display:none}
  .stats-row{grid-template-columns:1fr 1fr 1fr}
  .quick-actions{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="band"></div>
  <div class="top">
    <div class="logo"><img src="ca-logo.png" alt="Chowdury Accountants"></div>
    <div class="top-right">
      <span class="user-name" id="user-name"></span>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="company-card">
      <div class="co-label">Your Company</div>
      <div class="co-name" id="sidebar-company">Loading…</div>
    </div>
    <nav>
      <a href="client-portal.html" class="active"><span class="nav-icon">🏠</span>Dashboard</a>
      <a href="client-documents.html"><span class="nav-icon">📄</span>My Documents</a>
      <a href="client-myinfo.html"><span class="nav-icon">👤</span>My Info</a>
      <div class="nav-sep"></div>
      <a href="client-login.html" onclick="signOut();return false"><span class="nav-icon">🔒</span>Change Password</a>
    </nav>
  </div>

  <div class="content">
    <div id="loading" style="text-align:center;padding:60px;color:var(--muted)">Loading your portal…</div>
    <div id="portal-content" style="display:none">

      <div class="welcome-card">
        <div class="wc-greeting">Welcome back</div>
        <h2 id="wc-name">Hello!</h2>
        <div class="wc-company" id="wc-company"></div>
      </div>

      <div class="stats-row">
        <div class="stat-card gold">
          <div class="stat-val" id="stat-docs">—</div>
          <div class="stat-lbl">Documents</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-pending" style="color:#f59e0b">—</div>
          <div class="stat-lbl">Awaiting</div>
        </div>
        <div class="stat-card green">
          <div class="stat-val" id="stat-approved">—</div>
          <div class="stat-lbl">Approved</div>
        </div>
      </div>

      <div class="quick-actions">
        <a class="qa-card" href="client-documents.html">
          <div class="qa-icon">📄</div>
          <div class="qa-title">My Documents</div>
          <div class="qa-sub">View and sign documents</div>
        </a>
        <a class="qa-card" href="client-myinfo.html">
          <div class="qa-icon">👤</div>
          <div class="qa-title">My Info</div>
          <div class="qa-sub">Update your details</div>
        </a>
      </div>

      <div class="section-head">
        <h3>Recent Documents</h3>
        <a href="client-documents.html">View All →</a>
      </div>
      <div id="recent-docs"></div>

    </div>
  </div>
</div>

<script>
const SB_URL='https://yhvhpfsoqtjwnukgyqap.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
const SB=supabase.createClient(SB_URL,SB_KEY);

let CLIENT_EMAIL='';
let CLIENT_COMPANY='';

async function init(){
  const{data}=await SB.auth.getSession();
  if(!data||!data.session){window.location.replace('client-login.html');return;}
  const user=data.session.user;
  const meta=user.user_metadata||{};
  if(meta.role!=='client'){await SB.auth.signOut();window.location.replace('client-login.html');return;}

  CLIENT_EMAIL=user.email||'';
  const firstName=meta.first_name||CLIENT_EMAIL.split('@')[0];
  CLIENT_COMPANY=meta.company_name||'';

  document.getElementById('user-name').textContent=CLIENT_EMAIL;
  document.getElementById('sidebar-company').textContent=CLIENT_COMPANY||'Your Company';
  document.getElementById('wc-name').textContent='Welcome, '+firstName+'!';
  document.getElementById('wc-company').textContent=CLIENT_COMPANY;

  // Load documents
  await loadDocs();

  document.getElementById('loading').style.display='none';
  document.getElementById('portal-content').style.display='block';
}

async function loadDocs(){
  const res=await fetch(`${SB_URL}/rest/v1/client_approvals?company_name=eq.${encodeURIComponent(CLIENT_COMPANY)}&order=created_at.desc&select=*`,{headers:H});
  const docs=await res.json();
  if(!Array.isArray(docs)){return;}

  const total=docs.length;
  const pending=docs.filter(d=>d.status==='pending').length;
  const approved=docs.filter(d=>d.status==='approved').length;

  document.getElementById('stat-docs').textContent=total;
  document.getElementById('stat-pending').textContent=pending;
  document.getElementById('stat-approved').textContent=approved;

  const container=document.getElementById('recent-docs');
  const recent=docs.slice(0,5);
  if(!recent.length){
    container.innerHTML='<div class="empty-state">📭 No documents yet — your accountant will send documents here for your review.</div>';
    return;
  }

  container.innerHTML=recent.map(d=>{
    const docTypes=(d.documents||[]).map(x=>x.type).join(', ')||'Document';
    const date=d.created_at?new Date(d.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}):'—';
    const statusPill=d.status==='approved'
      ?'<span class="status-pill approved">✓ Approved</span>'
      :'<span class="status-pill pending">⏳ Awaiting</span>';
    const actionBtn=d.status==='pending'
      ?`<button class="btn-small gold" onclick="window.location.href='approve.html?token=${d.token}'">Sign Now</button>`
      :'<button class="btn-small dark" onclick="window.location.href=\'approve.html?token='+d.token+'\'">View</button>';
    return `<div class="doc-row">
      <div class="dr-left">
        <span class="dr-badge">${docTypes}</span>
        <div>
          <div class="dr-name">${d.company_name||'—'}</div>
          <div class="dr-date">${d.period_end?'Period: '+d.period_end+' &bull; ':''} Sent: ${date}</div>
        </div>
      </div>
      <div class="dr-right">${statusPill}${actionBtn}</div>
    </div>`;
  }).join('');
}

async function signOut(){
  await SB.auth.signOut();
  window.location.replace('client-login.html');
}

init();
</script>
</body>
</html>
