<!DOCTYPE html>

<style id="ca-nav-style">
#ca-nav{all:initial;display:block;position:fixed;top:0;left:0;right:0;z-index:99999;font-family:'Mulish','DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.25);background:#252525}
#ca-nav .ca-band{display:block;height:4px;background:#c8963c}
#ca-nav .ca-top{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:12px 32px;background:#252525;border-bottom:1px solid rgba(255,255,255,.06)}
#ca-nav .ca-logo img{height:36px;width:auto;display:block}
#ca-nav .ca-date{font-size:0.72rem;color:rgba(255,255,255,.35);font-family:monospace;white-space:nowrap;letter-spacing:0.5px}
#ca-nav .ca-links{display:flex;flex-direction:row;align-items:center;gap:2px;padding:0 28px;background:#252525;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#ca-nav .ca-links::-webkit-scrollbar{display:none}
#ca-nav .ca-links a{font-size:0.78rem;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;padding:10px 14px;border-bottom:3px solid transparent;white-space:nowrap;display:inline-block;transition:color .15s}
#ca-nav .ca-links a:hover{color:#fff;border-bottom-color:rgba(200,150,60,.4)}
#ca-nav .ca-links a.active{color:#fff;border-bottom-color:#c8963c}
#ca-nav .ca-links .ca-signout{margin-left:auto;color:rgba(255,255,255,.3);font-size:11px}
#ca-nav .ca-links .ca-signout:hover{color:#ff6b6b;border-bottom-color:transparent}
</style>
<div id="ca-nav">

<script>
(function(){var d=new Date();var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];var months=["January","February","March","April","May","June","July","August","September","October","November","December"];var el=document.getElementById("ca-hdr-date");if(el)el.textContent=days[d.getDay()]+", "+d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();})();
</script>




<h2>SA Test Page</h2>
<div id="status">Starting...</div>
<table border="1" id="tbl"><thead><tr><th>#</th><th>Name</th><th>UTR</th></tr></thead><tbody id="tbody"></tbody></table>
<script>
document.getElementById('status').textContent = 'JS running...';

const DATA = [
  {id:1, name:'Shuel Miah', utr:'5029148785'},
  {id:2, name:'Abul Kalam', utr:'1234567890'},
  {id:3, name:'Test Person', utr:'9876543210'}
];

document.getElementById('status').textContent = 'Data loaded: ' + DATA.length + ' clients';

const tb = document.getElementById('tbody');
tb.innerHTML = DATA.map((c,i) => `<tr><td>${i+1}</td><td>${c.name}</td><td>${c.utr}</td></tr>`).join('');

document.getElementById('status').textContent = 'Done - ' + DATA.length + ' rows rendered';
</script>
