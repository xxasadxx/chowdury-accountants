<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Document Approval — Chowdury Accountants</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c8963c;--dark:#1a1a18;--bg:#f0f2f5;--white:#fff;
  --ink:#252525;--muted:#888;--border:#e8e8e8;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-border:#a5d6a7;
  --red:#c62828;--amber:#e65100;
}
body{font-family:'Mulish','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:13px}

/* ── HEADER ── */
#ca-nav{background:var(--dark);position:sticky;top:0;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#ca-nav .ca-band{height:4px;background:var(--gold)}
#ca-nav .ca-top{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;border-bottom:1px solid rgba(255,255,255,.06)}
#ca-nav .ca-logo img{height:36px;width:auto;display:block}
#ca-nav .ca-contact{text-align:right;font-size:0.75rem;color:rgba(255,255,255,.45);line-height:1.6}
#ca-nav .ca-contact a{color:var(--gold);text-decoration:none}

/* ── LAYOUT ── */
.page-wrap{max-width:760px;margin:0 auto;padding:28px 16px 60px}

/* ── STATE CARDS ── */
.state-card{background:var(--white);border-radius:12px;padding:48px 32px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:8px}
.state-icon{font-size:3rem;margin-bottom:16px}
.state-card h2{font-size:1.2rem;font-weight:800;margin-bottom:8px}
.state-card p{color:var(--muted);font-size:0.9rem;line-height:1.7;margin-bottom:6px}
.state-card .phone{font-size:1rem;font-weight:700;color:var(--dark);margin-top:12px}

/* ── REQUEST HEADER CARD ── */
.req-card{background:var(--dark);border-radius:12px;padding:24px 28px;margin-bottom:16px;position:relative;overflow:hidden}
.req-card::after{content:'';position:absolute;right:-30px;bottom:-30px;width:140px;height:140px;border-radius:50%;background:rgba(200,150,60,.06)}
.req-card .req-firm{font-size:0.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.req-card h1{font-size:1.25rem;font-weight:800;color:var(--white);margin-bottom:3px}
.req-card .req-sub{color:var(--gold);font-size:0.88rem;font-weight:600;margin-bottom:18px}
.req-meta{display:flex;flex-wrap:wrap;gap:20px}
.meta-item .mk{font-size:0.68rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.meta-item .mv{font-size:0.85rem;color:var(--white);font-weight:700}

/* ── INTRO ── */
.intro-box{background:#fffbf2;border:1px solid #f0d888;border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:0.85rem;line-height:1.7;color:#6b4c00}

/* ── DOC CARDS ── */
.section-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px}
.doc-card{background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.doc-card-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:10px}
.doc-card-hd:hover{background:#fafafa}
.doc-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.doc-badge{background:var(--dark);color:var(--gold);padding:3px 9px;border-radius:5px;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.doc-fname{font-size:0.83rem;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-view{background:var(--gold);color:var(--white);border:none;border-radius:6px;padding:6px 12px;font-size:0.78rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;font-family:inherit}
.btn-view:hover{background:#b8852c}
.doc-chevron{color:#ccc;font-size:0.8rem;transition:transform .2s}
.doc-card.open .doc-chevron{transform:rotate(180deg)}
.doc-preview{display:none;border-top:1px solid var(--border);padding:14px}
.doc-card.open .doc-preview{display:block}
.pdf-frame{width:100%;height:480px;border:1px solid var(--border);border-radius:8px;background:#f5f5f5}

/* ── APPROVAL FORM ── */
.form-card{background:var(--white);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-top:16px}
.form-card-head{background:var(--dark);padding:16px 22px;display:flex;align-items:center;gap:8px}
.form-card-head h2{color:var(--white);font-size:0.95rem;font-weight:700}
.form-card-body{padding:22px}
.field-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;display:block}
.name-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:0.95rem;font-family:inherit;transition:border .15s;margin-bottom:14px}
.name-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,150,60,.1)}

/* SIGNATURE */
.sig-wrap{border:1.5px solid var(--border);border-radius:8px;padding:14px;background:#fafafa;margin-bottom:16px}
.sig-wrap .sig-lbl{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px}
.sig-text{font-family:'Brush Script MT','Segoe Script',cursive;font-size:1.6rem;color:var(--dark);min-height:48px;padding:4px 8px;letter-spacing:1px}

/* DECLARATION */
.decl-box{background:#f8f9fa;border:1.5px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px}
.decl-box .decl-lbl{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px}
.check-row{display:flex;gap:10px;align-items:flex-start;cursor:pointer}
.check-row input{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--gold);cursor:pointer}
.check-text{font-size:0.84rem;line-height:1.65;color:#333}
.check-text strong{color:var(--dark)}

/* SUBMIT */
.submit-btn{width:100%;background:var(--dark);color:var(--white);border:none;border-radius:10px;padding:15px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit}
.submit-btn:hover:not(:disabled){background:var(--gold)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.security-note{text-align:center;margin-top:14px;font-size:0.75rem;color:#bbb;line-height:1.6}
.security-note a{color:var(--gold);text-decoration:none}

/* SUCCESS */
.success-card{background:var(--white);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.success-head{background:var(--green-bg);border-bottom:1px solid var(--green-border);padding:28px;text-align:center}
.success-head .tick{font-size:2.8rem;margin-bottom:10px}
.success-head h2{font-size:1.2rem;font-weight:800;color:var(--green)}
.success-body{padding:24px}
.ref-pill{display:inline-block;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:10px 20px;margin:0 auto 20px;text-align:center}
.ref-pill .ref-lbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--green);margin-bottom:3px}
.ref-pill .ref-val{font-size:1rem;font-weight:800;color:var(--dark);font-family:monospace}
.proof-table{width:100%;border-collapse:collapse;font-size:0.84rem}
.proof-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.proof-table td:first-child{color:var(--muted);font-weight:700;width:130px}
.footer-note{background:#f8f9fa;border-radius:8px;padding:14px 16px;margin-top:16px;font-size:0.78rem;color:var(--muted);line-height:1.6;text-align:center}
.footer-note a{color:var(--gold);text-decoration:none}

/* FOOTER */
.ca-footer{text-align:center;padding:24px 16px;font-size:0.73rem;color:#bbb;line-height:1.8;border-top:1px solid var(--border);margin-top:20px}
.ca-footer a{color:var(--gold);text-decoration:none}

@media(max-width:600px){
  .req-meta{gap:12px}
  .doc-card-hd{flex-wrap:wrap}
  .pdf-frame{height:320px}
  .form-card-body{padding:16px}
}
</style>
</head>
<body>

<div id="ca-nav">
  <div class="ca-band"></div>
  <div class="ca-top">
    <div class="ca-logo"><img src="ca-logo.png" alt="Chowdury Accountants"></div>
    <div class="ca-contact">
      <a href="tel:01612224647">📞 0161 222 4647</a><br>
      <a href="mailto:info@chowduryaccountants.co.uk">info@chowduryaccountants.co.uk</a>
    </div>
  </div>
</div>

<div class="page-wrap" id="page-wrap">
  <div class="state-card">
    <div class="state-icon">⏳</div>
    <h2>Loading your documents…</h2>
    <p>Please wait while we retrieve your approval request.</p>
  </div>
</div>

<div class="ca-footer">
  The Chowdury Accountants Ltd &bull; Company Reg: 09441520 &bull; 283 Featherstall Road North, Oldham, OL1 2NH<br>
  AAT Licensed Accountants &bull; <a href="https://www.chowduryaccountants.co.uk">www.chowduryaccountants.co.uk</a>
</div>

<script>
const SB_URL='https://yhvhpfsoqtjwnukgyqap.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
const SB=supabase.createClient(SB_URL,SB_KEY);

let APPROVAL=null;
let SIGNED_URLS={};
const TOKEN=new URLSearchParams(window.location.search).get('token');

async function init(){
  if(!TOKEN){showError('Invalid Link','This approval link is not valid. Please contact your accountant.');return;}
  try{
    const res=await fetch(`${SB_URL}/rest/v1/client_approvals?token=eq.${TOKEN}&select=*`,{headers:H});
    if(!res.ok) throw new Error('Could not load approval request.');
    const data=await res.json();
    if(!data||!data.length){showError('Not Found','This approval link could not be found. It may have been deleted or expired.');return;}
    APPROVAL=data[0];
    if(APPROVAL.status==='approved'){showAlreadyApproved();return;}
    if(APPROVAL.status==='expired'||(APPROVAL.expiry_date&&new Date(APPROVAL.expiry_date)<new Date())){showExpired();return;}
    for(const doc of(APPROVAL.documents||[])){
      if(doc.storage_path){
        const{data:u,error}=await SB.storage.from('client-documents').createSignedUrl(doc.storage_path,3600);
        if(!error&&u) SIGNED_URLS[doc.storage_path]=u.signedUrl;
      }
    }
    renderPage();
  }catch(e){showError('Error',e.message||'An unexpected error occurred.');}
}

function renderPage(){
  const docs=APPROVAL.documents||[];
  const sentDate=APPROVAL.created_at?new Date(APPROVAL.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}):'—';
  document.getElementById('page-wrap').innerHTML=`
    <div class="req-card">
      <div class="req-firm">Chowdury Accountants — Document Approval Request</div>
      <h1>${APPROVAL.company_name}</h1>
      <div class="req-sub">For the attention of: ${APPROVAL.client_name}</div>
      <div class="req-meta">
        ${APPROVAL.period_end?`<div class="meta-item"><div class="mk">Period End</div><div class="mv">${APPROVAL.period_end}</div></div>`:''}
        <div class="meta-item"><div class="mk">Documents</div><div class="mv">${docs.length} enclosed</div></div>
        <div class="meta-item"><div class="mk">Prepared By</div><div class="mv">${APPROVAL.created_by||'Chowdury Accountants'}</div></div>
        <div class="meta-item"><div class="mk">Date Issued</div><div class="mv">${sentDate}</div></div>
      </div>
    </div>

    <div class="intro-box">
      <strong>Dear ${APPROVAL.client_name},</strong><br>
      Please review the document${docs.length>1?'s':''} below carefully before completing the approval declaration. By approving, you confirm these documents are accurate and complete to the best of your knowledge, and authorise Chowdury Accountants to proceed with submission.
    </div>

    <div class="section-label">📄 Documents for Approval (${docs.length})</div>
    ${docs.map((d,i)=>renderDocCard(d,i)).join('')}

    <div class="form-card" id="approval-form">
      <div class="form-card-head"><span>✍️</span><h2>Digital Approval &amp; Signature</h2></div>
      <div class="form-card-body">
        <label class="field-label">Your Full Name *</label>
        <input class="name-input" type="text" id="inp-name" placeholder="Type your full name as it appears on official documents" oninput="updateSig(this.value)">

        <div class="sig-wrap">
          <div class="sig-lbl">Signature Preview</div>
          <div class="sig-text" id="sig-preview">Your signature will appear here</div>
        </div>

        <div class="decl-box">
          <div class="decl-lbl">📋 Declaration</div>
          <label class="check-row">
            <input type="checkbox" id="chk-decl">
            <span class="check-text">
              I, <strong id="decl-name">the undersigned</strong>, confirm that I have reviewed the above document${docs.length>1?'s':''} and that the information contained is <strong>correct and complete to the best of my knowledge and belief</strong>. I authorise Chowdury Accountants to submit these documents to HMRC and/or Companies House on my behalf.
            </span>
          </label>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitApproval()">✅ Approve and Sign</button>
        <div class="security-note">
          🔒 This approval is legally binding and creates a full audit trail including your name, IP address and timestamp.<br>
          Questions? <a href="tel:01612224647">0161 222 4647</a> &bull; <a href="mailto:info@chowduryaccountants.co.uk">info@chowduryaccountants.co.uk</a>
        </div>
      </div>
    </div>`;
}

function renderDocCard(doc,i){
  const url=SIGNED_URLS[doc.storage_path]||'';
  return `<div class="doc-card" id="dcard-${i}">
    <div class="doc-card-hd" onclick="toggleDoc(${i})">
      <div class="doc-left">
        <span class="doc-badge">${doc.type}</span>
        <span class="doc-fname">${doc.filename||doc.type}</span>
      </div>
      <div class="doc-right">
        ${url?`<a class="btn-view" href="${url}" target="_blank" onclick="event.stopPropagation()">📄 Open PDF</a>`:''}
        <span class="doc-chevron">▼</span>
      </div>
    </div>
    ${url?`<div class="doc-preview" id="dprev-${i}"><iframe class="pdf-frame" src="${url}" title="${doc.type}"></iframe></div>`:''}
  </div>`;
}

function toggleDoc(i){
  document.getElementById(`dcard-${i}`).classList.toggle('open');
}

function updateSig(val){
  document.getElementById('sig-preview').textContent=val||'Your signature will appear here';
  const dn=document.getElementById('decl-name');
  if(dn) dn.textContent=val||'the undersigned';
}

async function submitApproval(){
  const name=document.getElementById('inp-name').value.trim();
  const checked=document.getElementById('chk-decl').checked;
  if(!name){alert('Please enter your full name.');document.getElementById('inp-name').focus();return;}
  if(!checked){alert('Please tick the declaration checkbox to confirm you have reviewed the documents.');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='⏳ Recording approval…';
  let ip='Unknown';
  try{const r=await fetch('https://api.ipify.org?format=json');ip=(await r.json()).ip||'Unknown';}catch(e){}
  const now=new Date().toISOString();
  const ref='CA-APR-'+TOKEN.substring(0,8).toUpperCase();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/client_approvals?token=eq.${TOKEN}`,{
      method:'PATCH',headers:H,
      body:JSON.stringify({status:'approved',approved_at:now,approved_name:name,approved_ip:ip,approved_user_agent:navigator.userAgent,declaration_confirmed:true})
    });
    if(!r.ok) throw new Error('Failed to record approval. Please try again or contact us.');
    try{await fetch(`${SB_URL}/rest/v1/audit_log`,{method:'POST',headers:H,body:JSON.stringify({action:`Client approval: ${APPROVAL.company_name} (${(APPROVAL.documents||[]).map(d=>d.type).join(', ')})`,details:`Signed: ${name} | IP: ${ip}`,user_name:name,created_at:now})});}catch(e){}
    // Generate signed PDF in background
    btn.textContent='⏳ Generating signed document…';
    let signedDocs=[];
    try{
      const sr=await fetch('/.netlify/functions/sign-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN})});
      const sd=await sr.json();
      if(sd.success&&sd.signed) signedDocs=sd.signed;
    }catch(e){console.warn('PDF signing skipped:',e);}
    showSuccess(name,now,ip,ref,signedDocs);
  }catch(e){
    btn.disabled=false;btn.textContent='✅ Approve and Sign';
    alert(e.message);
  }
}

function showSuccess(name,ts,ip,ref,signedDocs=[]){
  const docs=(APPROVAL.documents||[]).map(d=>d.type).join(', ');
  const dt=new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('page-wrap').innerHTML=`
    <div class="success-card">
      <div class="success-head">
        <div class="tick">✅</div>
        <h2>Documents Approved</h2>
      </div>
      <div class="success-body">
        <p style="text-align:center;color:var(--muted);margin-bottom:20px;font-size:0.88rem;line-height:1.7">
          Thank you, <strong>${name}</strong>. Your approval has been recorded and Chowdury Accountants will now proceed with the submission of your documents.
        </p>
        <div style="text-align:center">
          <div class="ref-pill">
            <div class="ref-lbl">Approval Reference</div>
            <div class="ref-val">${ref}</div>
          </div>
        </div>
        <div class="section-label" style="margin-top:20px">Approval Record</div>
        <table class="proof-table">
          <tr><td>Company</td><td><strong>${APPROVAL.company_name}</strong></td></tr>
          <tr><td>Documents</td><td>${docs}</td></tr>
          <tr><td>Period End</td><td>${APPROVAL.period_end||'—'}</td></tr>
          <tr><td>Signed By</td><td><strong>${name}</strong></td></tr>
          <tr><td>Date &amp; Time</td><td>${dt}</td></tr>
          <tr><td>IP Address</td><td>${ip}</td></tr>
          <tr><td>Declaration</td><td>✓ Confirmed</td></tr>
          <tr><td>Reference</td><td>${ref}</td></tr>
        </table>
        ${signedDocs&&signedDocs.length?`
        <div style="text-align:center;margin:20px 0">
          ${signedDocs.map(d=>`
            <a id="dl-${d.type}" style="display:inline-flex;align-items:center;gap:8px;background:#1a1a18;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.88rem;margin:4px" onclick="downloadSigned('${d.signed}','${d.type}');return false" href="#">
              ⬇️ Download Signed ${d.type}
            </a>`).join('')}
        </div>`:''}
        <div class="footer-note">
          We recommend saving or printing this page for your records. For any questions contact us on <strong>0161 222 4647</strong> or <a href="mailto:info@chowduryaccountants.co.uk">info@chowduryaccountants.co.uk</a>
        </div>
      </div>
    </div>`;
}

function showAlreadyApproved(){
  const dt=APPROVAL.approved_at?new Date(APPROVAL.approved_at).toLocaleString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  document.getElementById('page-wrap').innerHTML=`
    <div class="state-card">
      <div class="state-icon">✅</div>
      <h2 style="color:var(--green)">Already Approved</h2>
      <p>These documents were approved by <strong>${APPROVAL.approved_name||'you'}</strong> on <strong>${dt}</strong>.</p>
      <p>If you believe this is incorrect, please contact us.</p>
      <div class="phone">📞 0161 222 4647</div>
    </div>`;
}

function showExpired(){
  document.getElementById('page-wrap').innerHTML=`
    <div class="state-card">
      <div class="state-icon">⌛</div>
      <h2 style="color:var(--amber)">Link Expired</h2>
      <p>This approval link has expired. Links are valid for 30 days.</p>
      <p>Please contact Chowdury Accountants for a new link.</p>
      <div class="phone">📞 0161 222 4647</div>
    </div>`;
}

function showError(title,msg){
  document.getElementById('page-wrap').innerHTML=`
    <div class="state-card">
      <div class="state-icon">❌</div>
      <h2 style="color:var(--red)">${title}</h2>
      <p>${msg}</p>
      <div class="phone">📞 0161 222 4647</div>
    </div>`;
}

async function downloadSigned(path, type){
  try{
    const res=await fetch(`${SB_URL}/storage/v1/object/sign/client-documents/${path}`,{
      method:'POST',
      headers:{...H,'Content-Type':'application/json'},
      body:JSON.stringify({expiresIn:60})
    });
    const data=await res.json();
    const url=data.signedURL||data.signedUrl;
    if(url){
      const fullUrl=url.startsWith('http')?url:`${SB_URL}/storage/v1${url}`;
      const a=document.createElement('a');
      a.href=fullUrl;
      a.download=`Signed_${type}_${TOKEN.substring(0,8)}.pdf`;
      a.target='_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  }catch(e){alert('Download failed. Please contact us.');}
}

init();
</script>
</body>
</html>
