  document.getElementById('log').textContent='';

  log('Loading Ltd clients from Supabase...');
  const r=await fetch(SB+'/rest/v1/ltd_clients?select=id,comp_no,name&limit=500',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Range':'0-999'}});
  const ltdClients=await r.json();
  log('Loaded '+ltdClients.length+' Ltd clients');
  
  // Build normalised name map
  const ltdMap={};
  ltdClients.forEach(c=>{
    const n=norm(c.name);
    if(n) ltdMap[n]=c;
  });
  
  let matched=0, updated=0, skipped=0;
  
  for(let i=0;i<PAYE.length;i++){
    const p=PAYE[i];
    const pn=norm(p.employer_name);
    const ltdClient=ltdMap[pn];
    
    if(ltdClient){
      matched++;
      // Update email in Supabase
      const res=await fetch(SB+'/rest/v1/ltd_clients?id=eq.'+ltdClient.id,{
        method:'PATCH',headers:H,
        body:JSON.stringify({director_email:p.email})
      });
      if(res.ok||res.status===204){
        updated++;
        log('✅ '+p.employer_name+' → '+p.email);
      } else {
        log('❌ Failed: '+p.employer_name);
      }
    } else {
      skipped++;
      log('⚠️  No match: '+p.employer_name);
    }
    
    document.getElementById('s-matched').textContent=matched;
    document.getElementById('s-updated').textContent=updated;
    document.getElementById('s-skipped').textContent=skipped;
    document.getElementById('prog').value=i+1;
    await new Promise(r=>setTimeout(r,80));
  }
  
  log('\n🎉 Done! '+updated+' emails restored, '+skipped+' unmatched.');
  document.getElementById('btn-run').disabled=false;
  document.getElementById('btn-run').textContent='✅ Complete — Re-run if needed';
  document.getElementById('btn-run').style.background='#15803d';
}
</script>
</body></html>
