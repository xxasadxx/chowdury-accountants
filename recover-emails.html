function log(m){const e=document.getElementById('log');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight;}
async function run(){
  document.getElementById('btn').disabled=true;
  document.getElementById('log').textContent='';
  let done=0,err=0;
  for(const r of ROWS){
    try{
      const res=await fetch(SB+'/rest/v1/ltd_clients?comp_no=eq.'+encodeURIComponent(r.comp_no),{
        method:'PATCH',headers:H,body:JSON.stringify({director_email:r.email})

  }

}
