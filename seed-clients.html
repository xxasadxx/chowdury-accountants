async function runSeed(){
  document.getElementById('btn').disabled=true;
  document.getElementById('log').textContent='';
  let done=0,skipped=0;
  for(const r of ROWS){
    try{
      const res=await fetch(SB+'/rest/v1/clients?comp_no=eq.'+encodeURIComponent(r.comp_no),{
        method:'PATCH',headers:H,
        body:JSON.stringify({
          display_name:r.display_name,
          director_name:r.director_name,
          director_email:r.director_email,
          director_address:r.director_address
        })
      });
      if(res.ok){done++;}else{skipped++;}
    }catch(e){skipped++;}
    document.getElementById('prog').value=done+skipped;
    if((done+skipped)%20===0) log('✅ '+done+' updated, '+skipped+' skipped');
    await new Promise(res=>setTimeout(res,50));
  }
  log('\n🎉 Done! '+done+' updated.');
