function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function runSeed() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';
  log('Starting seed — ' + ROWS.length + ' companies in batches of 25...');
  
  const BATCH = 25;
  let done = 0, errors = 0;
  
  for (let i = 0; i < ROWS.length; i += BATCH) {
    const batch = ROWS.slice(i, i + BATCH);
    try {
      const r = await fetch(SB_URL + '/rest/v1/clients', {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify(batch)
      });
      if (r.ok) {
        done += batch.length;
        log('✅ Batch ' + (Math.floor(i/BATCH)+1) + ': ' + done + '/' + ROWS.length + ' done');
      } else {
        const t = await r.text();
        log('❌ Batch error (' + r.status + '): ' + t.slice(0,120));
        errors++;
      }
    } catch(e) {
      log('❌ Network error: ' + e.message);
      errors++;
    }
    await new Promise(res => setTimeout(res, 200));
  }
  
  if (errors === 0) {
    log('\n🎉 Complete! ' + done + ' companies seeded successfully.');
    log('You can now close this page and use the invoice client search.');
    btn.textContent = '✅ Done!';
    btn.className = 'done';
  } else {
    log('\n⚠️ Finished with ' + errors + ' batch errors. ' + done + ' companies seeded.');
  }
  btn.disabled = false;
}
