  el.scrollTop = el.scrollHeight;
}

async function supaFetch(method, path, body) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt);
  }
  return method === 'GET' ? res.json() : res.status;
}

async function runSeed() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  document.getElementById('logBox').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';

  try {
    log('Checking existing pipeline records...');
    const existing = await supaFetch('GET', 'dd_pipeline?select=id');
    log('Found ' + existing.length + ' existing records.');

    if (existing.length > 0) {
      log('Deleting existing records...');
      await supaFetch('DELETE', 'dd_pipeline?id=gte.0');
      log('Cleared ' + existing.length + ' existing records.');
    }

    const total = RECORDS.length;
    const batchSize = 20;
    let uploaded = 0;

    for (let i = 0; i < total; i += batchSize) {
      const batch = RECORDS.slice(i, i + batchSize);
      await supaFetch('POST', 'dd_pipeline', batch);
      uploaded += batch.length;
      const pct = Math.round((uploaded / total) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      log('Uploaded ' + uploaded + ' / ' + total + ' records...');
    }

    log('✅ Done! ' + total + ' records uploaded successfully.', 'success');
    log('P1 (Running Payroll): 35 companies — contact these first.', 'success');
    log('P3 (No Payroll): 63 companies — property clients + new clients.', 'success');
    log('You can now close this page and check the portal.', 'success');
    btn.textContent = '✅ Upload Complete';
    btn.style.background = '#166534';

  } catch(e) {
    log('❌ Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '▶ Retry Upload';
  }
}
</script>
