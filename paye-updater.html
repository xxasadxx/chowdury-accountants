<!DOCTYPE html>

<script>if(localStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<script>
(function(){
  var role=localStorage.getItem('ca_role')||'staff';
  var name=localStorage.getItem('ca_name')||'';
  var page=window.location.pathname.split('/').pop()||'index.html';
  var restricted=['revenue-tracker','strategic-review','revenue-tracker.html','strategic-review.html'];
  // Redirect staff from restricted pages immediately — check with and without .html
  var pageBase=page.replace('.html','');
  if(role!=='admin' && (restricted.indexOf(page)!==-1 || restricted.indexOf(pageBase)!==-1)){
    window.location.replace('index.html');return;
  }
  // Log session for admin (store in localStorage)
  if(name && page==='index.html'){
    try{
      var logs=JSON.parse(localStorage.getItem('ca_session_log')||'[]');
      logs.unshift({user:name,role:role,time:new Date().toISOString(),page:'Portal'});
      if(logs.length>200)logs=logs.slice(0,200);
      localStorage.setItem('ca_session_log',JSON.stringify(logs));
    }catch(e){}
  }
  // Apply restrictions after DOM ready
  function applyRestrictions(){
    if(role!=='admin'){
      // Hide restricted nav links (with and without .html)
      var sel='a[href="revenue-tracker.html"],a[href="strategic-review.html"],a[href="revenue-tracker"],a[href="strategic-review"]';
      [].forEach.call(document.querySelectorAll(sel),function(a){a.style.display='none';});
      // Hide restricted tool cards on portal
      [].forEach.call(document.querySelectorAll('a.tool-card[href="revenue-tracker.html"],a.tool-card[href="strategic-review.html"]'),function(c){c.style.display='none';});
      // Hide delete buttons
      [].forEach.call(document.querySelectorAll('button.act-del,.act-del,[onclick*="delActivity"],[onclick*="deleteClient"],[onclick*="delAct"]'),function(b){b.style.display='none';});
    }
    // Show logged-in user in nav
    var un=document.getElementById('ca-nav-user');
    if(un) un.textContent=name?'👤 '+name:'';
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',applyRestrictions);
  } else {
    applyRestrictions();
  }
})();
</script>

<script>
const SUPA_URL = 'https://yhvhpfsoqtjwnukgyqap.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const IDS = [6, 7, 10, 27, 28, 31, 34, 37, 43, 48, 49, 50, 72, 75, 84, 87, 88, 95, 109, 110, 122, 126, 130, 140, 144, 150, 151, 157, 158, 173, 179, 184, 201, 203, 225, 227, 240, 242, 244, 247, 250, 251, 268, 272, 276, 278, 300, 306];

const log = document.getElementById('log');
function lg(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}</span>\n`; }

async function runUpdate() {
  document.querySelector('button').disabled = true;
  lg(`Starting PAYE update for ${IDS.length} companies...\n`);
  
  let ok = 0, fail = 0;
  for (let i = 0; i < IDS.length; i++) {
    const id = IDS[i];
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/ltd_clients?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({paye_registered: true})
      });
      if (r.ok) { ok++; lg(`[${i+1}/${IDS.length}] ID ${id} ✓`); }
      else { fail++; lg(`[${i+1}/${IDS.length}] ID ${id} FAILED: ${r.status}`, 'error'); }
    } catch(e) {
      fail++;
      lg(`[${i+1}/${IDS.length}] ID ${id} ERROR: ${e.message}`, 'error');
    }
    await new Promise(r => setTimeout(r, 50));
  }
  
  lg(`\n${ok}/${IDS.length} updated successfully.`, ok === IDS.length ? 'done' : 'error');
  if (ok === IDS.length) lg('✅ All done! Go back to Ltd Tracker and hard refresh.', 'done');
}
</script>
