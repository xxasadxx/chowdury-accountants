<!DOCTYPE html>
<html>
<head>
<title>PAYE Batch Update</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a1a;color:#0f0}
.log{white-space:pre-wrap;font-size:13px}
button{background:#D04A02;color:#fff;border:none;padding:12px 24px;font-size:15px;cursor:pointer;border-radius:8px;margin-bottom:20px}
.done{color:#4CAF50}
.error{color:#f44}

<body>
<style id="ca-nav-style">
#ca-nav{all:initial;display:block;position:fixed;top:0;left:0;right:0;z-index:99999;font-family:'Mulish','DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.25);background:#252525}
#ca-nav .ca-band{display:block;height:4px;background:#c8963c}
#ca-nav .ca-top{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:12px 32px;background:#252525;border-bottom:1px solid rgba(255,255,255,.06)}
#ca-nav .ca-logo img{height:36px;width:auto;display:block}
#ca-nav .ca-date{font-size:0.72rem;color:rgba(255,255,255,.35);font-family:monospace;white-space:nowrap;letter-spacing:0.5px}
#ca-nav .ca-links{display:flex;flex-direction:row;align-items:center;gap:2px;padding:0 28px;background:#252525;overflow-x:auto;scrollbar-width:none}
#ca-nav .ca-links::-webkit-scrollbar{display:none}
#ca-nav .ca-links a{font-size:0.78rem;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;padding:10px 14px;border-bottom:3px solid transparent;white-space:nowrap;display:inline-block;transition:color .15s}
#ca-nav .ca-links a:hover{color:#fff;border-bottom-color:rgba(200,150,60,.4)}
#ca-nav .ca-links a.active{color:#fff;border-bottom-color:#c8963c}

body{padding-top:92px !important}
</style>
<div id="ca-nav">
  <div class="ca-band"></div>
  <div class="ca-top">
    <div class="ca-logo"><img src="ca-logo.png" alt="Chowdury Accountants"></div>
    <span class="ca-date" id="ca-hdr-date"></span>
  </div>
  <div class="ca-links" id="ca-links">
    <a href="index.html">🏠 Portal</a>
    <a href="revenue-tracker.html">💰 Revenue</a>
    <a href="ltd-tracker.html">🏢 Ltd Tracker</a>
    <a href="vat-tracker.html">🟢 VAT</a>
    <a href="paye-tracker.html">💼 PAYE</a>
    <a href="sa-tracker.html">📋 SA</a>
    <a href="ch-tracker.html">⚖️ CH Tracker</a>
    <a href="staff-management.html">👥 Staff</a>
    <a href="onboarding.html">🆕 Onboarding</a>
    <a href="communications.html">💬 Comms</a>
    <a href="calendar.html">📅 Calendar</a>
    <a href="strategic-review.html">📊 Strategy</a>
    <a href="login.html" class="ca-signout" onclick="sessionStorage.removeItem('ca_auth')">Sign out</a>
  </div>
</div>
<script>
(function(){
  var p=window.location.pathname.split('/').pop()||'index.html';
  if(!p||p==='') p='index.html';
  if(p.indexOf('.')===-1) p=p+'.html';
  document.querySelectorAll('#ca-links a:not(.ca-signout)').forEach(function(a){
    if(a.getAttribute('href')===p) a.classList.add('active');
  });
  var el=document.getElementById('ca-hdr-date');
  if(el) el.textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
})();
</script>

<h2 style="color:#fff">PAYE Batch Update — 48 companies</h2>
<p style="color:#aaa">Sets paye_registered = true for companies confirmed in Bright Manager payroll</p>
<button onclick="runUpdate()">▶ Run PAYE Update</button>
<div class="log" id="log"></div>

<script>
const SUPA_URL = 'https://yhvhpfsoqtjwnukgyqap.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const IDS = [6, 7, 10, 27, 28, 31, 34, 37, 43, 48, 49, 50, 72, 75, 84, 87, 88, 95, 109, 110, 122, 126, 130, 140, 144, 150, 151, 157, 158, 173, 179, 184, 201, 203, 225, 227, 240, 242, 244, 247, 250, 251, 268, 272, 276, 278, 300, 306];

const log = document.getElementById('log');
function lg(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}</span>\n`; }

async function runUpdate() {
  document.querySelector('button').disabled = true;
  lg(`Starting PAYE update for ${IDS.length} companies...\n`);
  
  let ok = 0, fail = 0;
  for (let i = 0; i < IDS.length; i++) {
    const id = IDS[i];
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/ltd_clients?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({paye_registered: true})
      });
      if (r.ok) { ok++; lg(`[${i+1}/${IDS.length}] ID ${id} ✓`); }
      else { fail++; lg(`[${i+1}/${IDS.length}] ID ${id} FAILED: ${r.status}`, 'error'); }
    } catch(e) {
      fail++;
      lg(`[${i+1}/${IDS.length}] ID ${id} ERROR: ${e.message}`, 'error');
    }
    await new Promise(r => setTimeout(r, 50));
  }
  
  lg(`\n${ok}/${IDS.length} updated successfully.`, ok === IDS.length ? 'done' : 'error');
  if (ok === IDS.length) lg('✅ All done! Go back to Ltd Tracker and hard refresh.', 'done');
}
</script>
</body>
</html>
