<!DOCTYPE html><html><head>
<script>if(localStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<script>
(function(){
  var role=localStorage.getItem('ca_role')||'';
  var name=localStorage.getItem('ca_name')||'';
  if(!role) return;
  var path=window.location.pathname;
  var page=path.split('/').pop().replace('.html','');
  if(!page) page='index';
  if(role!=='admin' && (page==='revenue-tracker'||page==='strategic-review')){
    window.location.replace('index.html'); return;
  }
  if(role!=='admin'){
    var style=document.createElement('style');
    style.innerHTML=
      '#nav-revenue{display:none!important}'+
      '#nav-strategy{display:none!important}'+
      '#card-revenue{display:none!important}'+
      '#card-strategy{display:none!important}'+
      '#hero-stats{display:none!important}'+
      'button.act-del{display:none!important}'+
      '.act-del{display:none!important}';
    document.head.appendChild(style);
  }
  window.addEventListener('DOMContentLoaded',function(){
    var el=document.getElementById('ca-nav-user');
    if(el) el.textContent=name?'\u{1F464} '+name:'';
    if(role==='admin'){
      var sec=document.getElementById('session-log-section');
      if(sec) sec.style.display='block';
    }
  });
  if(name){
    try{
      var logs=JSON.parse(localStorage.getItem('ca_session_log')||'[]');
      var last=logs[0];
      if(!last||last.user!==name||last.page!==page||(new Date()-new Date(last.time))>300000){
        logs.unshift({user:name,role:role,time:new Date().toISOString(),page:page});
        if(logs.length>500)logs=logs.slice(0,500);
        localStorage.setItem('ca_session_log',JSON.stringify(logs));
      }
    }catch(e){}
  }
})();
</script>
<meta http-equiv="refresh" content="0;url=communications.html">
<script>window.location.replace('communications.html');</script>
</head><body></body></html>
