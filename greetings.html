<!DOCTYPE html><html><head>
<script>if(localStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<script>
(function(){
  var role=localStorage.getItem('ca_role')||'staff';
  var user=localStorage.getItem('ca_user')||'';
  var page=window.location.pathname.split('/').pop()||'index.html';
  var restricted=['revenue-tracker.html','strategic-review.html'];
  if(role!=='admin' && restricted.indexOf(page)!==-1){
    window.location.href='index.html';return;
  }
  if(role!=='admin'){
    document.addEventListener('DOMContentLoaded',function(){
      document.querySelectorAll('a[href="revenue-tracker.html"],a[href="strategic-review.html"]').forEach(function(a){
        a.style.display='none';
      });
      document.querySelectorAll('[onclick*="delete"],[onclick*="Delete"],[onclick*="del("],button.act-del,.btn-del,[class*="delete"],[id*="delete"]').forEach(function(b){
        b.style.display='none';
      });
    });
  }
  if(page==='staff-management.html'){
    var name=localStorage.getItem('ca_name');
    if(name && !localStorage.getItem('ca_staff')){
      localStorage.setItem('ca_staff',name);
    }
  }
})();
</script>
<meta http-equiv="refresh" content="0;url=communications.html">
<script>window.location.replace('communications.html');</script>
</head><body></body></html>
