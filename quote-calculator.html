<!DOCTYPE html>
<html>
<head>
<script>if(localStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<script>
(function(){
  var role=localStorage.getItem('ca_role')||'staff';
  var user=localStorage.getItem('ca_user')||'';
  var page=window.location.pathname.split('/').pop()||'index.html';
  var restricted=['revenue-tracker.html','strategic-review.html'];
  if(role!=='admin' && restricted.indexOf(page)!==-1){
    window.location.href='index.html';return;
  }
  if(role!=='admin'){
    document.addEventListener('DOMContentLoaded',function(){
      document.querySelectorAll('a[href="revenue-tracker.html"],a[href="strategic-review.html"]').forEach(function(a){
        a.style.display='none';
      });
      document.querySelectorAll('[onclick*="delete"],[onclick*="Delete"],[onclick*="del("],button.act-del,.btn-del,[class*="delete"],[id*="delete"]').forEach(function(b){
        b.style.display='none';
      });
    });
  }
  if(page==='staff-management.html'){
    var name=localStorage.getItem('ca_name');
    if(name && !localStorage.getItem('ca_staff')){
      localStorage.setItem('ca_staff',name);
    }
  }
})();
</script>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=onboarding.html">
<script>window.location.replace('onboarding.html');</script>
</head>
<body>
<style id="ca-nav-style">
#ca-nav{all:initial;display:block;position:fixed;top:0;left:0;right:0;z-index:99999;font-family:'Mulish','DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.25);background:#252525}
#ca-nav .ca-band{display:block;height:4px;background:#c8963c}
#ca-nav .ca-top{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:12px 32px;background:#252525;border-bottom:1px solid rgba(255,255,255,.06)}
#ca-nav .ca-logo img{height:36px;width:auto;display:block}
#ca-nav .ca-date{font-size:0.72rem;color:rgba(255,255,255,.35);font-family:monospace;white-space:nowrap;letter-spacing:0.5px}
#ca-nav .ca-links{display:flex;flex-direction:row;align-items:center;gap:2px;padding:0 28px;background:#252525;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#ca-nav .ca-links::-webkit-scrollbar{display:none}
#ca-nav .ca-links a{font-size:0.78rem;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;padding:10px 14px;border-bottom:3px solid transparent;white-space:nowrap;display:inline-block;transition:color .15s}
#ca-nav .ca-links a:hover{color:#fff;border-bottom-color:rgba(200,150,60,.4)}
#ca-nav .ca-links a.active{color:#fff;border-bottom-color:#c8963c}
#ca-nav .ca-links .ca-signout{margin-left:auto;color:rgba(255,255,255,.3);font-size:11px}
#ca-nav .ca-links .ca-signout:hover{color:#ff6b6b;border-bottom-color:transparent}
</style>
<div id="ca-nav">
  <div class="ca-band"></div>
  <div class="ca-top">
    <div class="ca-logo"><img src="ca-logo.png" alt="Chowdury Accountants"></div>
    <div class="ca-date" id="ca-hdr-date"></div>
  </div>
  <div class="ca-links">
    <a href="index.html">🏠 Portal</a>
    <a href="revenue-tracker.html">💰 Revenue</a>
    <a href="ltd-tracker.html">🏢 Ltd Tracker</a>
    <a href="vat-tracker.html">🟢 VAT</a>
    <a href="paye-tracker.html">💼 PAYE</a>
    <a href="sa-tracker.html">📋 SA</a>
    <a href="ch-tracker.html">⚖️ CH Tracker</a>
    <a href="staff-management.html">👥 Staff</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="workflows.html">⚙️ Workflows</a>
    <a href="onboarding.html">🆕 Onboarding</a>
    <a href="communications.html">💬 Comms</a>
    <a href="calendar.html">🗓 Calendar</a>
    <a href="strategic-review.html">🚀 Strategy</a>
    <a href="login.html" class="ca-signout" onclick="['ca_auth','ca_user','ca_name','ca_role'].forEach(function(k){localStorage.removeItem(k);})">Sign out</a>
  </div>
</div>
<script>
(function(){var d=new Date();var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];var months=["January","February","March","April","May","June","July","August","September","October","November","December"];var el=document.getElementById("ca-hdr-date");if(el)el.textContent=days[d.getDay()]+", "+d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();})();
(function(){var links=document.querySelector('.ca-links');if(!links)return;var active=links.querySelector('a.active');if(active){var offset=active.offsetLeft-16;links.scrollLeft=Math.max(0,offset);}else{links.scrollLeft=0;}})();
</script>




</body>
</html>
