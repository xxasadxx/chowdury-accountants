// ── AUDIT LOGGER ─────────────────────────────────────────────────────────
window.caAudit = (function(){
  var SB='https://yhvhpfsoqtjwnukgyqap.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
  function log(action, detail, page){
    var staff=localStorage.getItem('ca_name')||'Unknown';
    var pg=page||window.location.pathname.split('/').pop().replace('.html','');
    fetch(SB+'/rest/v1/audit_log',{
      method:'POST',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({staff:staff,action:action,detail:detail,page:pg,created_at:new Date().toISOString()})
    }).catch(function(){});
  }
  return {log:log};
})();

(function(){var d=new Date();var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];var months=["January","February","March","April","May","June","July","August","September","October","November","December"];var el=document.getElementById("ca-hdr-date");if(el)el.textContent=days[d.getDay()]+", "+d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();})();
