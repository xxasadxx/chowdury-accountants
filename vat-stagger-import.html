<!DOCTYPE html>
<html>
<head>
<script>if(sessionStorage.getItem("ca_auth")!=="true"){window.location.href="login.html";}</script>
<style>body{font-family:sans-serif;padding:30px;max-width:600px;margin:0 auto}
button{padding:10px 20px;background:#155FA0;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-top:16px}
#log{margin-top:20px;font-size:12px;font-family:monospace;background:#f5f5f5;padding:16px;border-radius:6px;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.ok{color:green}.err{color:red}</style>
</head>
<body>
<h2>VAT Stagger Bulk Update</h2>
<p>This will update <strong>vat_stagger</strong> for all 41 VAT-registered Ltd clients in Supabase using data from the VAT Tracker.</p>
<p>Values will be stored as <code>1</code>, <code>2</code>, or <code>3</code> (numeric string) matching Group 1/2/3.</p>
<button onclick="runUpdate()">▶ Run Update</button>
<div id="log">Ready — click Run Update to start.</div>

<script src="vat_stagger_update.js"></script>
<script>
const SB='https://yhvhpfsoqtjwnukgyqap.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

const log = document.getElementById('log');
function addLog(msg, cls=''){
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

async function runUpdate(){
  log.innerHTML = '';
  addLog(`Starting update for ${VAT_STAGGER_DATA.length} clients...`);
  let ok=0, fail=0;
  for(const c of VAT_STAGGER_DATA){
    try{
      const r = await fetch(SB+'/rest/v1/ltd_clients?comp_no=eq.'+encodeURIComponent(c.comp_no), {
        method:'PATCH',
        headers:{...H,'Prefer':'return=minimal'},
        body: JSON.stringify({vat_stagger: c.vat_stagger})
      });
      if(r.ok || r.status===204){
        ok++;
        addLog(`✓ ${c.comp_no} → Group ${c.vat_stagger}`, 'ok');
      } else {
        fail++;
        addLog(`✗ ${c.comp_no} — HTTP ${r.status}`, 'err');
      }
    }catch(e){
      fail++;
      addLog(`✗ ${c.comp_no} — ${e.message}`, 'err');
    }
  }
  addLog('');
  addLog(`Done: ${ok} updated, ${fail} failed`, ok===VAT_STAGGER_DATA.length?'ok':'err');
  if(ok===VAT_STAGGER_DATA.length) addLog('✅ All clients updated — you can close this page.', 'ok');
}
</script>
</body>
</html>
