const H = {'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal'};

function log(m){const e=document.getElementById('log');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight;}

async function runMigration(){
  document.getElementById('btn-run').disabled = true;
  document.getElementById('log').textContent = '';
  const BATCH = 50;
  let done = 0, errors = 0;
  document.getElementById('prog').max = ROWS.length;
  document.getElementById('s-total').textContent = ROWS.length;
  
  log('Starting migration of ' + ROWS.length + ' records in batches of ' + BATCH + '...');
  
  for(let i = 0; i < ROWS.length; i += BATCH){
    const batch = ROWS.slice(i, i + BATCH);
    try{
      const res = await fetch(SB + '/rest/v1/ltd_clients', {
        method: 'POST',
        headers: H,
        body: JSON.stringify(batch)
      });
      if(res.ok || res.status === 201){
        done += batch.length;
        log('✅ Batch ' + Math.ceil((i+1)/BATCH) + ': ' + (i+1) + '-' + Math.min(i+BATCH, ROWS.length) + ' done');
      } else {
        const t = await res.text();
        errors += batch.length;
        log('❌ Batch error: ' + t.substring(0,200));
      }
    } catch(e){
      errors += batch.length;
      log('❌ Network error: ' + e.message);
    }
    document.getElementById('s-done').textContent = done;
    document.getElementById('s-err').textContent = errors;
    document.getElementById('prog').value = done + errors;
    await new Promise(r => setTimeout(r, 200));
  }
  
  log('\n🎉 Migration complete! ' + done + ' records synced, ' + errors + ' errors.');
  log('\nThe InformDirect sync will now be able to auto-update ALL clients.');
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-run').textContent = '✅ Done — Re-run if needed';
  document.getElementById('btn-run').style.background = '#15803d';
}
