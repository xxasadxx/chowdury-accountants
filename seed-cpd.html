const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
function log(m){const e=document.getElementById('log');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight;}
async function run(){
  document.getElementById('btn').disabled=true;
  document.getElementById('log').textContent='';
  let done=0,errors=0;
  for(const r of ROWS){
    try{
      const res=await fetch(SB+'/rest/v1/cpd_activities',{method:'POST',headers:H,body:JSON.stringify(r)});
      if(res.ok||res.status===201){done++;log('✅ '+r.title+' ('+r.cpd_year+', '+r.hours+'h)');}
      else{errors++;const t=await res.text();log('❌ '+r.title+': '+t.substring(0,100));}
    }catch(e){errors++;log('❌ '+r.title+': '+e.message);}
    document.getElementById('prog').value=done+errors;
    await new Promise(res=>setTimeout(res,200));
  }
  log('\n🎉 Done! '+done+' activities logged, '+errors+' errors.');
  document.getElementById('btn').disabled=false;
  document.getElementById('btn').textContent='✅ Complete';
  document.getElementById('btn').style.background='#15803d';
}
