<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Fix CPD</title>
<style>body{font-family:sans-serif;padding:30px;background:#f8f8f8}
#log{background:#111;color:#0f0;padding:16px;border-radius:8px;font-family:monospace;font-size:12px;height:200px;overflow-y:auto;white-space:pre-wrap}</style>
</head>
<body>
<h2>🔧 Fix CPD Activities</h2>
<div id="log">Running...</div>
<script>
const SB='https://yhvhpfsoqtjwnukgyqap.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlodmhwZnNvcXRqd251a2d5cWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzUzODQsImV4cCI6MjA4ODExMTM4NH0.QDTVLU0vNRc3WJfYTOOG3ct9G2Ywgd49dC5hr6to3P4';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
function log(m){const e=document.getElementById('log');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight;}

async function run(){
  // 1. Get all Asadul activities
  const r=await fetch(SB+'/rest/v1/cpd_activities?staff=eq.Asadul&select=id,title',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  const acts=await r.json();
  log('Found '+acts.length+' activities');
  acts.forEach(a=>log('  #'+a.id+': '+a.title));

  // 2. Delete BNI
  const bni=acts.find(a=>a.title.toLowerCase().includes('bni'));
  if(bni){
    await fetch(SB+'/rest/v1/cpd_activities?id=eq.'+bni.id,{method:'DELETE',headers:H});
    log('\n✅ Deleted: '+bni.title);
  }

  // 3. Update peer meetings - 6 hours (once every 2 months x 1hr)
  const peer=acts.find(a=>a.title.toLowerCase().includes('peer group'));
  if(peer){
    await fetch(SB+'/rest/v1/cpd_activities?id=eq.'+peer.id,{
      method:'PATCH',headers:H,
      body:JSON.stringify({
        hours:6,
        description:'Monthly full-day meetings rotating across practices with AH Accountancy, KAS Accountancy and ICM Accountancy — approximately once every two months. Agenda covers: technical tax discussions, practice management, client handling, fee setting, regulatory updates, business development.',
        reflection:'Regular peer learning from experienced practitioners. Structured discussions have directly improved client advisory quality and practice management decisions.'
      })
    });
    log('✅ Updated peer meetings: 12h → 6h (once every 2 months)');
  }

  log('\n🎉 Done! Refresh the CPD tracker.');
}
run();
</script>
</body>
</html>
